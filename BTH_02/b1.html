<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="b1.css">
    <title>Contact Us</title>
</head>
<body>
    <div class="container">
        <h3>Get in touch with us by filling out the form below</h3>
        <form>
            <div class ="row">
                <input type="text" placeholder="*Enter your full name" required>
                <input type="email" placeholder="*Enter your email address" required>
                </div>
            <input type="text" placeholder="*Enter your subject" required>
            <textarea name="" id="" cols="30" rows="10" placeholder="*your message here" required></textarea>
            <div class="row bottom">
                <button type="submit">Send Message</button>
                <span>*Please fill all required field, thanks!</span>
            </div>
        </form>
    </div>
</body>
</html>
