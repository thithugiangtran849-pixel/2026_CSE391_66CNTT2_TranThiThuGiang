<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Travel Page</title>
    <link rel="stylesheet" href="b2.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header>
    <h2>TRAVEL GOALS</h2>
    <nav>
        <a href="#">Destination</a>
        <a href="#">About</a>
    </nav>
</header>

<section class="hero">
    <div class="overlay">
        <h1>JOE'S TRAVEL PAGE</h1>
        <p>LET'S EXPLORE THE WORLD TOGETHER</p>
        <button>Discover places</button>
    </div>
</section>

<main>
    <h3>HIGHLIGHTS</h3>
    <div class="cards">
        <div class="card">
            <img src="miami.png" alt="miami">
            <p>MIAMI USA</p>
        </div>
        <div class="card">
            <img src="munich.jpg" alt="munich">
            <p>MUNICH GERMANY</p>
        </div>
        <div class="card">
            <img src="barcelona.jpg" alt="barcelona">
            <p>BARCELONA SPAIN</p>
        </div>
    </div>
</main>


<footer>
    <i class="fa-brands fa-instagram"></i>
    <i class="fa-brands fa-facebook"></i>
</footer>


</body>
</html>
